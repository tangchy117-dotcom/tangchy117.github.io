<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能订单解析</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 120px; box-sizing: border-box; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background: #eee; }
    </style>
</head>
<body>
<div class="container">
    <h2>订单智能解析</h2>
    <textarea id="inputText" placeholder="输入：19公斤猪肉，16个鸡蛋..."></textarea>
    <button onclick="parseText()">解析并生成表格</button>
    <table id="resultTable">
        <thead>
            <tr><th>菜名</th><th>柬名</th><th>数量</th><th>单位</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>
<script>
    const foodMap = {
        "猪肉": "សាច់ជ្រូក", "鸡蛋": "ពងមាន់", "苹果": "ផ្លែប៉ោម", "鸭": "សាច់ទា",
        "牛肉": "សាច់គោ", "鸡肉": "សាច់មាន់", "鱼": "ត្រី", "青菜": "បន្លែ",
        "大米": "អង្ករ", "糖": "ស្ករ", "盐": "អំបិល", "西瓜": "ឪឡឹក"
    };

    function parseText() {
        const input = document.getElementById('inputText').value;
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        const items = input.split(/[，,、\s]+/);
        
        // 匹配规则：数字 + (可选单位) + 菜名
        const regex = /(\d+)\s*(公斤|个|只|根|条|斤|克|两|箱|瓶|袋|包|把|块|件)?\s*([\u4e00-\u9fa5]+)/;

        items.forEach(item => {
            if (!item.trim()) return;
            const match = item.match(regex);
            if (match) {
                let qty = match[1];
                let unit = match[2] || "";
                let name = match[3];
                let khmer = foodMap[name] || "未定义";
                
                tbody.insertAdjacentHTML('beforeend', 
                    `<tr><td>${name}</td><td>${khmer}</td><td>${qty}</td><td>${unit}</td></tr>`);
            }
        });
    }
</script>
</body>
</html>
