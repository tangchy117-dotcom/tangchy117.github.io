<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能订单解析</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 120px; box-sizing: border-box; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background: #eee; }
    </style>
</head>
<body>
<div class="container">
    <h2>订单智能解析</h2>
    <textarea id="inputText" placeholder="输入：土鸡18只 或 18只土鸡..."></textarea>
    <button onclick="parseText()">解析并生成表格</button>
    <table id="resultTable">
        <thead><tr><th>菜名</th><th>数量</th><th>单位</th></tr></thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>
<script>
    function parseText() {
        const input = document.getElementById('inputText').value;
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        const items = input.split(/[，,、\s]+/);
        
        // 此正则支持：名称+数字+单位 或 数字+单位+名称
        const regex = /([\u4e00-\u9fa5]+)?\s*(\d+)\s*(公斤|个|只|根|条|斤|克|两|箱|瓶|袋|包|把|块|件)?\s*([\u4e00-\u9fa5]+)?/;

        items.forEach(item => {
            if (!item.trim()) return;
            const match = item.match(regex);
            if (match) {
                // 如果match[1]有值，说明是“名称+数字”格式；否则是“数字+名称”格式
                let name = match[1] || match[4];
                let qty = match[2];
                let unit = match[3] || "";
                tbody.insertAdjacentHTML('beforeend', `<tr><td>${name}</td><td>${qty}</td><td>${unit}</td></tr>`);
            }
        });
    }
</script>
</body>
</html>
